name: CI

on: [push, pull_request, workflow_dispatch]

defaults:
  run:
    working-directory: codemods

jobs:
  test:
    name: Run test Suite
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        node: [18, 20, latest]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install

      - name: Lint Files
        run: yarn lint

      - name: Run test suite
        run: yarn test
